general:
  startup_commands: ["shell-exec zebar"]
  focus_follows_cursor: false
  toggle_workspace_on_refocus: false
  cursor_jump:
    enabled: true
    trigger: "window_focus"
  hide_title_bar: true
gaps:
  inner_gap: "10px"
  outer_gap:
    top: "50px"
    right: "10px"
    bottom: "10px"
    left: "10px"

window_effects:
  focused_window:
    border:
      enabled: true
      color: "#bea3c7"
      width: "10px"
  other_windows:
    border:
      enabled: true
      color: "#a1a1a1"

window_behavior:
  initial_state: "tiling"
  state_defaults:
    floating:
      centered: true
      shown_on_top: true
    fullscreen:
      maximized: false
      shown_on_top: false

workspaces:
  - name: "1"
  - name: "2"
  - name: "3"
  - name: "4"
  - name: "5"
  - name: "6"
  - name: "7"
  - name: "8"
  - name: "9"

window_rules:
  - commands: ["set-tiling"]
    match:
      - window_process: { equals: "wezterm-gui" }
  - commands: ["ignore"]
    match:
      - window_process: { equals: "zebar" }
      - window_title: { regex: "[Pp]icture.in.[Pp]icture" }
        window_class: { regex: "Chrome_WidgetWin_1|MozillaDialogClass" }
      - window_process: { equals: "PowerToys.PowerAccent" }
      - window_process: { equals: "Lively" }
        window_class: { regex: "HwndWrapper*" }

binding_modes:
  - name: "resize"
    keybindings:
      - commands: ["resize --width -2%"]
        bindings: ["h", "left"]
      - commands: ["resize --width +2%"]
        bindings: ["l", "right"]
      - commands: ["resize --height +2%"]
        bindings: ["k", "up"]
      - commands: ["resize --height -2%"]
        bindings: ["j", "down"]
      - commands: ["wm-disable-binding-mode --name resize"]
        bindings: ["escape", "enter"]
  - name: "pause"
    keybindings:
      - commands: ["wm-disable-binding-mode --name pause"]
        bindings: ["lwin+shift+p"]

keybindings:
  # Focus
  - commands: ["focus --direction left"]
    bindings: ["lwin+h", "lwin+left"]
  - commands: ["focus --direction right"]
    bindings: ["lwin+l", "lwin+right"]
  - commands: ["focus --direction up"]
    bindings: ["lwin+k", "lwin+up"]
  - commands: ["focus --direction down"]
    bindings: ["lwin+j", "lwin+down"]

  # Move
  - commands: ["move --direction left"]
    bindings: ["lwin+shift+h", "lwin+shift+left"]
  - commands: ["move --direction right"]
    bindings: ["lwin+shift+l", "lwin+shift+right"]
  - commands: ["move --direction up"]
    bindings: ["lwin+shift+k", "lwin+shift+up"]
  - commands: ["move --direction down"]
    bindings: ["lwin+shift+j", "lwin+shift+down"]

  # Resize
  # Resize with Meta+Ctrl+arrows
  - commands: ["resize --width -2%"]
    bindings: ["lwin+ctrl+left", "lwin+ctrl+h"]
  - commands: ["resize --width +2%"]
    bindings: ["lwin+ctrl+right", "lwin+ctrl+l"]
  - commands: ["resize --height +2%"]
    bindings: ["lwin+ctrl+up", "lwin+ctrl+k"]
  - commands: ["resize --height -2%"]
    bindings: ["lwin+ctrl+down", "lwin+ctrl+j"]

  # Binding modes
  - commands: ["wm-enable-binding-mode --name pause"]
    bindings: ["lwin+shift+p"]

  # Window state
  - commands: ["toggle-tiling-direction"]
    bindings: ["lwin+v"]
  - commands: ["toggle-floating --centered"]
    bindings: ["lwin+y", "lwin+shift+space"]
  - commands: ["toggle-tiling"]
    bindings: ["lwin+t"]
  - commands: ["toggle-fullscreen"]
    bindings: ["lwin+f"]
  - commands: ["toggle-minimized"]
    bindings: ["lwin+m"]
  - commands: ["close"]
    bindings: ["lwin+shift+q"]

  # WM controls
  - commands: ["wm-exit"]
    bindings: ["lwin+shift+e"]
  - commands: ["wm-reload-config"]
    bindings: ["lwin+shift+r"]
  - commands: ["wm-redraw"]
    bindings: ["lwin+shift+w"]

  # Launch WezTerm (also handled by AHK Win+Enter)
  - commands: ["shell-exec 'C:/Users/LookFrost/scoop/apps/wezterm-nightly/current/wezterm-gui.exe'"]
    bindings: ["lwin+enter"]

  # Workspace navigation
  - commands: ["focus --next-workspace"]
    bindings: ["lwin+s"]
  - commands: ["focus --prev-workspace"]
    bindings: ["lwin+a"]
  - commands: ["focus --recent-workspace"]
    bindings: ["lwin+d"]

  # Focus workspace
  - commands: ["focus --workspace 1"]
    bindings: ["lwin+1"]
  - commands: ["focus --workspace 2"]
    bindings: ["lwin+2"]
  - commands: ["focus --workspace 3"]
    bindings: ["lwin+3"]
  - commands: ["focus --workspace 4"]
    bindings: ["lwin+4"]
  - commands: ["focus --workspace 5"]
    bindings: ["lwin+5"]
  - commands: ["focus --workspace 6"]
    bindings: ["lwin+6"]
  - commands: ["focus --workspace 7"]
    bindings: ["lwin+7"]
  - commands: ["focus --workspace 8"]
    bindings: ["lwin+8"]
  - commands: ["focus --workspace 9"]
    bindings: ["lwin+9"]

  # Move workspace to monitor
  - commands: ["move-workspace --direction left"]
    bindings: ["lwin+shift+a"]
  - commands: ["move-workspace --direction right"]
    bindings: ["lwin+shift+f"]
  - commands: ["move-workspace --direction up"]
    bindings: ["lwin+shift+d"]
  - commands: ["move-workspace --direction down"]
    bindings: ["lwin+ctrl+s"]

  # Move window to workspace
  - commands: ["move --workspace 1", "focus --workspace 1"]
    bindings: ["lwin+shift+1"]
  - commands: ["move --workspace 2", "focus --workspace 2"]
    bindings: ["lwin+shift+2"]
  - commands: ["move --workspace 3", "focus --workspace 3"]
    bindings: ["lwin+shift+3"]
  - commands: ["move --workspace 4", "focus --workspace 4"]
    bindings: ["lwin+shift+4"]
  - commands: ["move --workspace 5", "focus --workspace 5"]
    bindings: ["lwin+shift+5"]
  - commands: ["move --workspace 6", "focus --workspace 6"]
    bindings: ["lwin+shift+6"]
  - commands: ["move --workspace 7", "focus --workspace 7"]
    bindings: ["lwin+shift+7"]
  - commands: ["move --workspace 8", "focus --workspace 8"]
    bindings: ["lwin+shift+8"]
  - commands: ["move --workspace 9", "focus --workspace 9"]
    bindings: ["lwin+shift+9"]
